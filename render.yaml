services:
  - type: web
    name: photo-album-manager
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    startCommand: "gunicorn photo_manager.wsgi:application --workers 2 --threads 2 --timeout 60"

    healthCheckPath: /

    envVars:
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: photo-album-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: USE_CLOUDINARY
        value: "True"

databases:
  - name: photo-album-db
    databaseName: photo_manager
    region: oregon
    plan: free
    postgresMajorVersion: "15"
