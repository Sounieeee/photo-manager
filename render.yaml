services:
  - type: web
    name: photo-album-manager
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn photo_manager.wsgi:application --workers 2 --timeout 60"
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: photo-album-db
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      - key: USE_CLOUDINARY
        value: "True"

databases:
  - name: photo-album-db
    databaseName: photo_manager
    region: oregon
    plan: free
    postgresMajorVersion: "15"
